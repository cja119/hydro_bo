price_dynamics:
  enabled: false
  kappa: 5.0          # mean reversion speed (annual)
  mu: 1.6094          # long-run mean of log-price (ln(5) ≈ 1.61 => $5/kg)
  sigma: 0.7          # annual volatility
  lambda: 12.0        # jump intensity (expected jumps per year)
  jump_mu: 0.05       # mean jump size in log space
  jump_sigma: 0.2     # jump size volatility in log space
  initial_price: 5.0  # starting price ($/kg)